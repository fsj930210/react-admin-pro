<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg{fill:#f6f7f9}.panel{fill:#fff;stroke:#d9dee7;stroke-width:1}.soft{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1}.line{stroke:#e5e7eb;stroke-width:1}.text{font-family:Inter,Arial,"Microsoft YaHei",sans-serif;fill:#111827}.muted{fill:#6b7280}.blue{fill:#2563eb}.blueText{fill:#1d4ed8}.green{fill:#10b981}.red{fill:#ef4444}.label{fill:#0f172a;font-size:18px;font-weight:700}.small{font-size:14px}.xs{font-size:12px}.title{font-size:28px;font-weight:700}.call{fill:#fff7ed;stroke:#fb923c;stroke-width:2}.callText{fill:#9a3412;font-weight:700;font-size:14px}.btn{fill:#fff;stroke:#cbd5e1;stroke-width:1}.btnPrimary{fill:#2563eb}.dash{stroke-dasharray:8 6}
    </style>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <rect x="40" y="32" width="1360" height="828" rx="8" class="panel"/>

  <text x="72" y="88" class="text title">用户管理</text>
  <text x="72" y="118" class="text muted small">管理用户账号、状态、角色和组织归属</text>
  <rect x="1220" y="58" width="132" height="40" rx="6" class="btnPrimary"/>
  <text x="1258" y="84" class="text small" fill="#fff">新建用户</text>
  <rect x="1060" y="58" width="140" height="40" rx="6" class="btn"/>
  <text x="1100" y="84" class="text muted small">刷新</text>
  <rect x="58" y="46" width="120" height="86" rx="8" class="call" fill-opacity=".25"/>
  <text x="72" y="48" class="callText">1 Page</text>

  <rect x="72" y="152" width="1296" height="128" rx="8" class="soft"/>
  <text x="92" y="178" class="text label">2 ProSearchBar (top, collapsible)</text>
  <rect x="96" y="198" width="250" height="42" rx="6" class="panel"/>
  <text x="116" y="224" class="text muted small">姓名 / 手机号</text>
  <rect x="362" y="198" width="210" height="42" rx="6" class="panel"/>
  <text x="382" y="224" class="text muted small">状态</text>
  <rect x="588" y="198" width="330" height="42" rx="6" class="panel"/>
  <text x="608" y="224" class="text muted small">创建时间范围</text>
  <rect x="934" y="198" width="190" height="42" rx="6" class="panel"/>
  <text x="954" y="224" class="text muted small">组织</text>
  <rect x="1140" y="198" width="82" height="42" rx="6" class="btnPrimary"/>
  <text x="1166" y="224" class="text small" fill="#fff">查询</text>
  <rect x="1234" y="198" width="82" height="42" rx="6" class="btn"/>
  <text x="1260" y="224" class="text muted small">重置</text>
  <text x="92" y="260" class="text muted xs">收起时只展示一行；展开/收起、校验、submit/reset 由 search 逻辑提供，字段 UI 仍由用户写。</text>

  <rect x="72" y="304" width="1296" height="72" rx="8" class="panel"/>
  <text x="92" y="332" class="text label">3 Toolbar / ProButtonGroup</text>
  <rect x="96" y="346" width="84" height="34" rx="6" class="btnPrimary"/>
  <text x="124" y="368" class="text xs" fill="#fff">新建</text>
  <rect x="190" y="346" width="84" height="34" rx="6" class="btn"/>
  <text x="218" y="368" class="text muted xs">删除</text>
  <rect x="284" y="346" width="84" height="34" rx="6" class="btn"/>
  <text x="312" y="368" class="text muted xs">导入</text>
  <rect x="378" y="346" width="84" height="34" rx="6" class="btn"/>
  <text x="406" y="368" class="text muted xs">导出</text>
  <rect x="472" y="346" width="84" height="34" rx="6" class="btn"/>
  <text x="500" y="368" class="text muted xs">更多</text>
  <text x="610" y="356" class="text muted xs">按钮过多时按数组顺序从尾部折叠到“更多”</text>
  <text x="1080" y="332" class="text label">4 KeywordSearch</text>
  <rect x="1080" y="346" width="260" height="34" rx="6" class="panel"/>
  <text x="1100" y="368" class="text muted xs">搜索姓名 / 手机号</text>

  <rect x="72" y="400" width="1296" height="368" rx="8" class="panel"/>
  <text x="92" y="430" class="text label">5 ProDataGrid</text>
  <rect x="96" y="456" width="1248" height="52" class="soft"/>
  <text x="116" y="488" class="text small">姓名</text>
  <text x="330" y="488" class="text small">手机号</text>
  <text x="560" y="488" class="text small">状态</text>
  <text x="760" y="488" class="text small">创建时间</text>
  <text x="1040" y="488" class="text small">操作</text>
  <text x="620" y="440" class="callText">6 DataGrid header filters</text>
  <circle cx="598" cy="482" r="8" class="blue"/>
  <circle cx="848" cy="482" r="8" class="blue"/>
  <line x1="96" y1="508" x2="1344" y2="508" class="line"/>
  <g class="text small">
    <text x="116" y="548">张三</text><text x="330" y="548">13800000001</text><text x="560" y="548">启用</text><text x="760" y="548">2026-06-08</text><text x="1040" y="548" class="blueText">编辑 删除</text>
    <text x="116" y="598">李四</text><text x="330" y="598">13800000002</text><text x="560" y="598">停用</text><text x="760" y="598">2026-06-07</text><text x="1040" y="598" class="blueText">编辑 删除</text>
    <text x="116" y="648">王五</text><text x="330" y="648">13800000003</text><text x="560" y="648">启用</text><text x="760" y="648">2026-06-06</text><text x="1040" y="648" class="blueText">编辑 删除</text>
  </g>
  <line x1="96" y1="568" x2="1344" y2="568" class="line"/>
  <line x1="96" y1="618" x2="1344" y2="618" class="line"/>
  <line x1="96" y1="668" x2="1344" y2="668" class="line"/>
  <text x="92" y="742" class="text muted xs">request 自动合并 page/pageSize/search/keyword/sorter/filters，transformResponse 输出 data/total。</text>

  <rect x="72" y="790" width="1296" height="52" rx="8" class="panel"/>
  <text x="92" y="822" class="text label">7 Pagination</text>
  <rect x="1160" y="804" width="38" height="28" rx="4" class="btn"/>
  <text x="1175" y="823" class="text xs">1</text>
  <rect x="1208" y="804" width="38" height="28" rx="4" class="btnPrimary"/>
  <text x="1223" y="823" class="text xs" fill="#fff">2</text>
  <rect x="1256" y="804" width="84" height="28" rx="4" class="btn"/>
  <text x="1272" y="823" class="text xs">20 / 页</text>
</svg>
