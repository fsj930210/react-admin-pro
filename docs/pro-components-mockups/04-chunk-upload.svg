<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs><style>.bg{fill:#f6f7f9}.panel{fill:#fff;stroke:#d9dee7}.soft{fill:#f8fafc;stroke:#e2e8f0}.line{stroke:#e5e7eb}.text{font-family:Inter,Arial,"Microsoft YaHei",sans-serif;fill:#111827}.muted{fill:#6b7280}.blue{fill:#2563eb}.green{fill:#10b981}.orange{fill:#f59e0b}.red{fill:#ef4444}.btn{fill:#fff;stroke:#cbd5e1}.btnP{fill:#2563eb}.title{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.small{font-size:14px}.xs{font-size:12px}.call{fill:#fefce8;stroke:#eab308;stroke-width:2}.callText{fill:#854d0e;font-size:14px;font-weight:700}</style></defs>
  <rect class="bg" width="1440" height="900"/>
  <rect x="40" y="32" width="1360" height="828" rx="8" class="panel"/>
  <text x="72" y="88" class="text title">人员导入</text>
  <text x="72" y="118" class="text muted small">Excel 里可能包含头像图片，文件大小不可控，走分片上传</text>
  <rect x="58" y="46" width="130" height="86" rx="8" class="call" fill-opacity=".25"/><text x="72" y="48" class="callText">1 Page</text>

  <rect x="72" y="156" width="520" height="650" rx="8" class="panel"/>
  <text x="100" y="194" class="text label">2 ChunkUpload / DirectoryUpload</text>
  <rect x="106" y="230" width="430" height="190" rx="10" class="soft" stroke-dasharray="10 8"/>
  <text x="200" y="310" class="text label">拖拽文件或目录到这里</text>
  <text x="186" y="342" class="text muted small">支持 .xlsx / .zip / 图片目录</text>
  <rect x="242" y="366" width="150" height="40" rx="6" class="btnP"/><text x="286" y="392" class="text small" fill="#fff">选择文件</text>
  <text x="100" y="466" class="text small">配置</text>
  <rect x="100" y="492" width="190" height="38" rx="6" class="soft"/><text x="118" y="516" class="text muted small">minChunkSize: 2MB</text>
  <rect x="310" y="492" width="190" height="38" rx="6" class="soft"/><text x="328" y="516" class="text muted small">chunkSize: 5MB</text>
  <rect x="100" y="548" width="190" height="38" rx="6" class="soft"/><text x="118" y="572" class="text muted small">concurrency: 4</text>
  <rect x="310" y="548" width="190" height="38" rx="6" class="soft"/><text x="328" y="572" class="text muted small">MD5 Worker: on</text>
  <text x="100" y="638" class="text muted xs">小文件低于 minChunkSize 可走普通上传；大文件自动分片、断点续传。</text>

  <rect x="620" y="156" width="748" height="650" rx="8" class="panel"/>
  <text x="650" y="194" class="text label">3 useChunkUpload task list</text>
  <text x="650" y="220" class="text muted xs">hashProgress / uploadProgress / totalProgress 分开暴露</text>

  <rect x="650" y="256" width="680" height="128" rx="8" class="soft"/>
  <text x="676" y="290" class="text small">users-with-avatar.xlsx</text>
  <text x="676" y="316" class="text muted xs">状态：hashing，Worker 计算 MD5，可取消</text>
  <text x="676" y="346" class="text xs">MD5 进度</text>
  <rect x="760" y="336" width="470" height="12" rx="6" fill="#e5e7eb"/><rect x="760" y="336" width="210" height="12" rx="6" class="orange"/>
  <text x="1245" y="346" class="text xs">45%</text>
  <rect x="1240" y="282" width="70" height="32" rx="6" class="btn"/><text x="1262" y="303" class="text xs">取消</text>

  <rect x="650" y="410" width="680" height="144" rx="8" class="soft"/>
  <text x="676" y="444" class="text small">photos.zip</text>
  <text x="676" y="470" class="text muted xs">状态：uploading，跳过已上传分片，失败分片自动重试</text>
  <text x="676" y="500" class="text xs">上传进度</text>
  <rect x="760" y="490" width="470" height="12" rx="6" fill="#e5e7eb"/><rect x="760" y="490" width="340" height="12" rx="6" class="blue"/>
  <text x="1245" y="500" class="text xs">72%</text>
  <rect x="1084" y="514" width="70" height="32" rx="6" class="btn"/><text x="1106" y="535" class="text xs">暂停</text>
  <rect x="1164" y="514" width="70" height="32" rx="6" class="btn"/><text x="1186" y="535" class="text xs">重试</text>
  <rect x="1244" y="514" width="70" height="32" rx="6" class="btn"/><text x="1266" y="535" class="text xs">取消</text>

  <rect x="650" y="580" width="680" height="116" rx="8" class="soft"/>
  <text x="676" y="614" class="text small">template-small.xlsx</text>
  <text x="676" y="640" class="text muted xs">状态：success，小文件普通上传完成</text>
  <text x="676" y="668" class="text xs">总进度</text>
  <rect x="760" y="658" width="470" height="12" rx="6" fill="#e5e7eb"/><rect x="760" y="658" width="470" height="12" rx="6" class="green"/>
  <text x="1240" y="668" class="text xs">100%</text>

  <text x="650" y="760" class="text muted xs">异常边界：Worker 失败 fallback、文件读取失败、网络中断、分片重试耗尽、merge 失败、路由切换取消。</text>
</svg>
